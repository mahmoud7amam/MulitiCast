<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Bot Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-gold: #c5a880;
            --accent-gold-hover: #e5c59e;
            --text-color: #c5a880;
            --text-white: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: var(--container-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(197, 168, 128, 0.25);
        }
        h1, h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--accent-gold);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #121212;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            background: var(--accent-gold);
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--accent-gold-hover);
            box-shadow: 0 0 10px rgba(197, 168, 128, 0.5);
        }
        .btn-obc {
            background: #28a745;
            color: white;
            margin-bottom: 8px;
        }
        .btn-bc {
            background: #dc3545;
            color: white;
        }
        .bot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background: #333;
        }
        .divider {
            height: 1px;
            background: var(--accent-gold);
            margin: 20px 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 لوحة التحكم بالبوتات</h1>
    
    <!-- إضافة بوت (+addb) -->
    <div class="form-group">
        <label>إضافة توكن جديد (+addb)</label>
        <input type="text" id="newToken" placeholder="ضع توكن البوت هنا...">
        <button class="btn" onclick="addBot()">إضافة البوت وتحميله 📥</button>
    </div>

    <div class="divider"></div>

    <!-- النشر الجماعي (+obc / +bc) -->
    <div class="form-group">
        <label>نص رسالة البرودكاست (ستقوم البوتات بمنشن العضو تلقائياً):</label>
        <textarea id="bcMessage" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
    </div>

    <div class="form-group">
        <label>عدد البوتات المطلوب استخدامها للنشر:</label>
        <input type="number" id="botCount" value="1" min="1">
    </div>

    <button class="btn btn-obc" onclick="sendBroadcast(true)">إطلاق حملة للأونلاين فقط (+obc) 🟢</button>
    <button class="btn btn-bc" onclick="sendBroadcast(false)">إطلاق حملة للجميع (+bc) 🔴</button>

    <div class="divider"></div>

    <!-- عرض حالة البوتات (+bots) -->
    <h2>🤖 قائمة وحالة البوتات (+bots)</h2>
    <div id="botsList">
        <p style="text-align: center;">جاري جلب حالة البوتات...</p>
    </div>
</div>

<script>
    const API_URL = window.location.origin;

    // جلب البوتات وتحديث القائمة تلقائياً
    async function loadBots() {
        try {
            const res = await fetch(`${API_URL}/api/bots`);
            const bots = await res.json();
            const listDiv = document.getElementById('botsList');
            listDiv.innerHTML = '';
            
            if (bots.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #888;">لا توجد بوتات مضافة حالياً.</p>';
                return;
            }

            bots.forEach(bot => {
                listDiv.innerHTML += `
                    <div class="bot-item">
                        <span style="font-size: 12px; color: #aaa;">${bot.masked_token}</span>
                        <span class="status-badge">${bot.status}</span>
                    </div>
                `;
            });
        } catch (e) {
            console.error("خطأ أثناء جلب البوتات", e);
        }
    }

    // إضافة بوت جديد
    async function addBot() {
        const token = document.getElementById('newToken').value.trim();
        if(!token) return alert("برجاء وضع التوكن أولاً!");

        const res = await fetch(`${API_URL}/api/add-bot`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ token })
        });
        const data = await res.json();
        alert(data.message);
        document.getElementById('newToken').value = '';
        loadBots();
    }

    // إرسال برودكاست
    async function sendBroadcast(onlineOnly) {
        const message = document.getElementById('bcMessage').value.trim();
        const botCount = document.getElementById('botCount').value;

        if(!message) return alert("برجاء كتابة الرسالة أولاً!");

        const res = await fetch(`${API_URL}/api/broadcast`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: message,
                bot_count: botCount,
                online_only: onlineOnly
            })
        });
        const data = await res.json();
        alert(data.message);
        setTimeout(loadBots, 2000); // تحديث القائمة بعد ثانيتين لمشاهدة الحالة الجديدة
    }

    // تحديث لستة البوتات كل 10 ثوان تلقائياً لمراقبة النشر
    setInterval(loadBots, 10000);
    loadBots();
</script>
</body>
</html>
